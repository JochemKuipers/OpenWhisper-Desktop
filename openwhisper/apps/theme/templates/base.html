{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en" class="{% block html_class %}{% endblock %}">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>
            {% block title %}OpenWhisper{% endblock %}
        </title>
        {% tailwind_css %}
        {% block extra_head %}{% endblock %}
    </head>
    <body class="{% block body_class %}min-h-screen bg-slate-50 text-slate-900 antialiased{% endblock %}">
        {% block body %}{% endblock %}
    </body>
</html>
